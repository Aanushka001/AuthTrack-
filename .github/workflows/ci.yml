name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-ml-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install linting tools
        run: pip install flake8 pytest

      - name: Lint
        run: flake8 . --max-line-length=120 --exclude=__pycache__,.venv,tests,venv,node_modules

      - name: Run tests
        run: pytest

  test-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-ml-service, test-server]

    steps:
      - uses: actions/checkout@v4

      - name: Build ML image
        run: docker build -t ml-service ./ml-service

      - name: Build Server image
        run: docker build -t server ./server

      - name: Build Client image
        run: docker build -t client ./client